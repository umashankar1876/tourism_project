name: Test HF Token Validation

on:
  workflow_dispatch:

jobs:
  validate-token:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install huggingface_hub
        run: pip install huggingface_hub
      
      - name: Test HF Token
        run: |
          echo "Testing HF_TOKEN secret..."
          python3 << 'EOF'
          import os
          from huggingface_hub import login, whoami
          
          token = os.getenv('HF_TOKEN')
          
          if not token:
              print("❌ HF_TOKEN is empty or not set!")
              exit(1)
          
          print(f"✅ HF_TOKEN is set (length: {len(token)} characters)")
          
          try:
              user_info = whoami()
              login(token=token)
              user_info = whoami()
              print(f"✅ Token is VALID!")
              print(f"✅ Logged in as: {user_info['name']}")
              print(f"✅ User ID: {user_info['user_id']}")
          except Exception as e:
              print(f"❌ Token validation FAILED!")
              print(f"❌ Error: {str(e)}")
              exit(1)
          EOF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
