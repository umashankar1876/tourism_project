name: Test Secret Validation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Verify HF_TOKEN Secret Exists
        run: |
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "❌ HF_TOKEN Secret is empty or not set!"
            exit 1
          else
            echo "✅ HF_TOKEN Secret is set and accessible"
            echo "Secret length: ${#HF_TOKEN}"
          fi
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
