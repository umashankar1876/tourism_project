- name: Test HF Token
        run: |
          echo "Testing HF_TOKEN secret..."
          python3 << 'EOF'
          import os
          from huggingface_hub import login, whoami
          
          token = os.getenv('HF_TOKEN')
          
          if not token:
              print("❌ HF_TOKEN is empty or not set!")
              exit(1)
          
          print(f"✅ HF_TOKEN is set (length: {len(token)} characters)")
          
          try:
              # Login without storing token to ephemeral git credentials helper
              login(token=token, add_to_git_credential=False)
              
              # Call the imported function directly without "api." prefix
              user_info = whoami()
              
              username = user_info.get("name") 
              print(f"✅ Token is VALID!")
              print(f"✅ Logged in as: {username}")
              
              # Safely grab the unique platform id from the payload response
              user_id = user_info.get('id', 'N/A')
              print(f"✅ User ID: {user_id}")
          except Exception as e:
              print(f"❌ Token validation FAILED!")
              print(f"❌ Error: {str(e)}")
              exit(1)
          EOF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
